services:
  postgres:
    image: postgres:16-alpine
    container_name: partnerradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: partnerradar
      POSTGRES_PASSWORD: partnerradar
      POSTGRES_DB: partnerradar
    ports:
      - '5432:5432'
    volumes:
      - partnerradar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U partnerradar']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  partnerradar_postgres_data:
