name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: partnerradar
          POSTGRES_PASSWORD: partnerradar
          POSTGRES_DB: partnerradar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://partnerradar:partnerradar@localhost:5432/partnerradar_test?schema=public
      NEXTAUTH_SECRET: ci-only-test-secret-change-in-prod-xxxxxxxxxxxxx
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-only-test-secret-change-in-prod-xxxxxxxxxxxxx
      STORM_API_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (test DB)
        run: pnpm db:migrate:prod

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test
